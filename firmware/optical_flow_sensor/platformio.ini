; Optical Flow Sensor — unified firmware
; Combines TSL2561 burst-capture logging (Capture mode) and on-device droplet
; characterization (Analysis mode) into a single image for the Arduino Zero.
; Target: Arduino Zero (SAMD21 Cortex-M0+)
; https://docs.platformio.org/page/projectconf.html

[env:zero]
platform = atmelsam
board = zero
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/SD@^1.2.4
    adafruit/Adafruit Unified Sensor@^1.1.13
    adafruit/Adafruit TSL2561@^1.1.0
